<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vida — organize tudo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&family=Lora:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root{
    --paper:#FAF6EE;
    --paper-raised:#FFFFFF;
    --ink:#20281F;
    --ink-soft:#5B6358;
    --line:#E4DDC9;
    --accent:#3F6657;
    --accent-soft:#E7EFE9;
    --accent-contrast:#FFFFFF;
    --clay:#C2643F;
    --clay-soft:#F6E3D7;
    --gold:#B98A2E;
    --gold-soft:#F4EAD3;
    --danger:#B5442E;
    --panel-bg:#F3EFE2;
    --radius:10px;
    --shadow: 0 1px 2px rgba(32,40,31,0.06), 0 6px 18px rgba(32,40,31,0.06);
    --font-display: 'Fraunces', serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:var(--font-body);
    font-size:14px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    transition:background .15s,color .15s;
  }
  ::selection{ background:var(--clay-soft); }
  button{ font-family:inherit; cursor:pointer; }
  input,textarea,select{ font-family:inherit; font-size:inherit; color:inherit; }
  a{ color:var(--accent); }

  /* ---------- layout ---------- */
  #app{ display:flex; min-height:100vh; }

  .sidebar{
    width:248px; flex-shrink:0;
    background:var(--panel-bg);
    border-right:1px solid var(--line);
    display:flex; flex-direction:column;
    padding:18px 14px;
    position:sticky; top:0; height:100vh;
    transition:transform .18s ease;
  }
  /* sidebar placement variants */
  body.sb-fixed-right .sidebar{ order:2; border-right:none; border-left:1px solid var(--line); }
  body.sb-fixed-right #app{ flex-direction:row; }
  body.sb-fixed-top #app, body.sb-fixed-bottom #app{ flex-direction:column; }
  body.sb-fixed-top .sidebar{ order:0; width:100%; height:auto; position:static; border-right:none; border-bottom:1px solid var(--line); }
  body.sb-fixed-bottom .sidebar{ order:2; width:100%; height:auto; position:static; border-right:none; border-top:1px solid var(--line); }

  /* ---------- shared horizontal toolbar look (top/bottom, floating or fixed-expand) ---------- */
  body.sb-horizontal .sidebar{
    flex-direction:row; align-items:center; gap:6px 10px; flex-wrap:nowrap;
    overflow-x:auto; overflow-y:hidden; scrollbar-width:thin;
  }
  body.sb-horizontal .sidebar::-webkit-scrollbar{ height:6px; }
  body.sb-horizontal .sidebar::-webkit-scrollbar-thumb{ background:var(--line); border-radius:4px; }
  body.sb-horizontal .brand{ margin:0; flex-shrink:0; }
  body.sb-horizontal .brand small{ display:none; }
  body.sb-horizontal .search-box{ margin:0; flex-shrink:0; width:42px; padding:7px; overflow:hidden; transition:width .16s ease; }
  body.sb-horizontal .search-box input{ width:0; opacity:0; transition:width .16s ease, opacity .16s ease; }
  body.sb-horizontal .search-box:focus-within{ width:190px; }
  body.sb-horizontal .search-box:focus-within input{ width:100%; opacity:1; }
  body.sb-horizontal .nav-label{ display:none; }
  body.sb-horizontal .nav-row{ display:flex; align-items:center; gap:4px; flex-shrink:0; }
  body.sb-horizontal .sep{ display:block; }
  body.sb-horizontal .nav-item{ width:auto; flex-shrink:0; white-space:nowrap; padding:7px 10px; }
  body.sb-horizontal .nav-item .count{ margin-left:6px; }
  body.sb-horizontal .nav-item .check{ display:none; }
  body.sb-horizontal .sep{ width:1px; align-self:stretch; background:var(--line); flex-shrink:0; margin:4px 0; }
  body.sb-horizontal .tag-filters{ flex-direction:row; flex-wrap:nowrap; padding:0; flex-shrink:0; }
  body.sb-horizontal .tag-pill{ flex-shrink:0; }
  body.sb-horizontal .sidebar-foot{ flex-direction:row; margin:0 0 0 auto; padding:0; flex-shrink:0; }
  body.sb-horizontal .ghost-btn{ padding:7px 9px; white-space:nowrap; }
  body.sb-horizontal .ghost-btn span.gb-text{ display:none; }

  /* ---------- floating mode (esquerda/direita) ---------- */
  body.sb-floating .sidebar{
    position:fixed; z-index:70; box-shadow:0 10px 40px rgba(0,0,0,0.25);
    height:auto; max-height:88vh; transition:transform .18s ease;
  }
  body.sb-floating.sb-side-left .sidebar{ left:14px; top:14px; bottom:14px; height:calc(100vh - 28px); border-radius:var(--radius); border:1px solid var(--line); }
  body.sb-floating.sb-side-right .sidebar{ right:14px; top:14px; bottom:14px; height:calc(100vh - 28px); border-radius:var(--radius); border:1px solid var(--line); }
  body.sb-floating .sidebar.collapsed{ transform:translateX(-120%); }
  body.sb-floating.sb-side-right .sidebar.collapsed{ transform:translateX(120%); }
  body.sb-floating .main{ margin:0; }
  .sb-toggle-fab{
    position:fixed; z-index:71; top:14px; left:14px; background:var(--accent); color:var(--accent-contrast);
    border:none; border-radius:var(--radius); width:38px; height:38px; display:none; align-items:center; justify-content:center;
    box-shadow:var(--shadow); font-size:15px; transition:left .18s ease, right .18s ease, top .18s ease, bottom .18s ease;
  }
  body.sb-floating .sb-toggle-fab{ display:flex; }

  /* ---------- fixed expandable mode (cima/baixo) ---------- */
  body.sb-fixed-expand #app{ flex-direction:column; }
  body.sb-fixed-expand .sidebar{
    position:static; z-index:auto; transition:max-height .22s ease, padding .22s ease;
  }
  body.sb-fixed-expand.sb-side-top .sidebar{
    order:0; width:100%; max-height:54px; overflow:hidden; padding:9px 16px;
    border-right:none; border-left:none; border-top:none; border-bottom:1px solid var(--line); border-radius:0;
  }
  body.sb-fixed-expand.sb-side-bottom .sidebar{
    order:2; width:100%; max-height:54px; overflow:hidden; padding:9px 16px;
    border-right:none; border-left:none; border-bottom:none; border-top:1px solid var(--line); border-radius:0;
  }
  body.sb-fixed-expand.sb-side-top .sidebar.expanded,
  body.sb-fixed-expand.sb-side-bottom .sidebar.expanded{
    max-height:58vh; overflow-y:auto; flex-wrap:wrap; align-items:flex-start;
  }
  body.sb-fixed-expand .sidebar.expanded .search-box{ width:190px; }
  body.sb-fixed-expand .sidebar.expanded .search-box input{ width:100%; opacity:1; }
  body.sb-fixed-expand .sidebar:not(.expanded) .tag-filters{ display:none; }
  body.sb-fixed-expand .sb-expand-handle{
    display:flex; flex-shrink:0; margin-left:4px; align-items:center; justify-content:center;
    width:26px; height:26px; border:1px solid var(--line); border-radius:50%; background:var(--paper-raised);
    color:var(--ink-soft); transition:transform .18s ease, background .12s;
  }
  body.sb-fixed-expand .sb-expand-handle:hover{ background:var(--accent-soft); color:var(--ink); }
  body.sb-fixed-expand .sb-expand-handle.expanded{ transform:rotate(180deg); }
  .sb-expand-handle{ display:none; }
  .brand{
    font-family:var(--font-display);
    font-weight:600; font-size:21px;
    letter-spacing:0.2px;
    display:flex; align-items:baseline; gap:7px;
    margin:2px 6px 16px;
    position:relative;
  }
  .brand .dot{ color:var(--clay); font-size:21px; }
  .brand small{ font-family:var(--font-body); font-weight:500; font-size:11px; color:var(--ink-soft); letter-spacing:0.5px; text-transform:uppercase;}
  .save-indicator{
    font-family:var(--font-body); font-weight:600; font-size:10px; letter-spacing:0.3px;
    color:var(--accent); background:var(--accent-soft); padding:2px 8px; border-radius:99px;
    margin-left:6px; opacity:0; transform:translateY(-2px); transition:opacity .18s, transform .18s;
    text-transform:none; white-space:nowrap;
  }
  .save-indicator.visible{ opacity:1; transform:translateY(0); }
  .save-indicator.syncing{ color:var(--gold); background:var(--gold-soft); }
  .save-indicator.synced{ color:var(--accent); background:var(--accent-soft); }

  .overdue-badge{
    display:none; align-items:center; gap:6px; width:100%; margin:0 0 10px;
    background:var(--clay-soft); color:var(--danger); border:1px solid transparent;
    border-radius:var(--radius); padding:7px 10px; font-size:12px; font-weight:700; text-align:left;
  }
  .overdue-badge:hover{ border-color:var(--danger); }
  .overdue-badge.active{ background:var(--danger); color:#fff; }

  .search-box{
    display:flex; align-items:center; gap:8px;
    background:var(--paper-raised); border:1px solid var(--line);
    border-radius:var(--radius); padding:7px 10px; margin-bottom:16px;
  }
  .search-box input{ border:none; outline:none; background:transparent; width:100%; font-size:13px; }
  .search-box svg{ flex-shrink:0; opacity:0.5; }

  .nav-label{
    font-size:10.5px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase;
    color:var(--ink-soft); margin:14px 8px 6px;
  }
  .nav-row{ display:flex; flex-direction:column; }
  .sep{ display:none; }
  .nav-item{
    display:flex; align-items:center; gap:10px;
    padding:8px 10px; border-radius:8px; border:none; background:transparent;
    width:100%; text-align:left; color:var(--ink); font-size:13.5px; font-weight:500;
    transition:background .12s;
  }
  .nav-item:hover{ background:rgba(0,0,0,0.05); }
  .nav-item.active{ background:var(--accent); color:var(--accent-contrast); }
  .nav-item svg{ flex-shrink:0; }
  .nav-item .count{ margin-left:auto; font-size:11px; opacity:0.65; font-family:var(--font-mono); }
  .nav-item .check{ margin-left:auto; flex-shrink:0; width:14px; height:14px; border-radius:4px; border:1.5px solid rgba(255,255,255,0.5); display:flex; align-items:center; justify-content:center; font-size:9px; }
  .nav-item:not(.active) .check{ border-color:var(--line); }
  .nav-item.active .check{ background:rgba(255,255,255,0.18); border-color:rgba(255,255,255,0.7); }

  .tag-filters{ display:flex; flex-wrap:wrap; gap:6px; padding:0 8px; }
  .tag-pill{
    font-size:11px; padding:3px 9px; border-radius:99px; border:1px solid var(--line);
    background:var(--paper-raised); color:var(--ink-soft); font-weight:500;
  }
  .tag-pill.active{ background:var(--ink); color:var(--paper); border-color:var(--ink); }

  .sidebar-foot{ margin-top:auto; padding:8px; display:flex; flex-direction:column; gap:6px; }
  .ghost-btn{
    background:transparent; border:1px dashed var(--line); border-radius:var(--radius);
    padding:7px 10px; font-size:12px; color:var(--ink-soft); text-align:left;
    display:flex; align-items:center; gap:7px;
  }
  .ghost-btn:hover{ border-color:var(--ink-soft); color:var(--ink); }
  #importBtn.drop-hover{ border-color:var(--accent); background:var(--accent-soft); color:var(--ink); border-style:solid; }

  /* ---------- pin / favorite ---------- */
  .pin-btn{ background:none; border:none; font-size:14px; color:var(--ink-soft); opacity:0.5; padding:2px; line-height:1; }
  .pin-btn:hover{ opacity:1; }
  .pin-btn.active{ color:var(--gold); opacity:1; }
  tr.pinned-row, .check-row.pinned-row{ background:var(--gold-soft); }
  tr.pinned-row:hover{ background:var(--gold-soft); filter:brightness(0.97); }

  /* ---------- relative date badges ---------- */
  .rel-date{ font-size:10.5px; font-weight:700; padding:1px 7px; border-radius:99px; white-space:nowrap; }
  .rel-date.today{ background:var(--accent-soft); color:var(--accent); }
  .rel-date.soon{ background:var(--gold-soft); color:#8A641E; }
  .rel-date.overdue{ background:var(--clay-soft); color:var(--danger); font-weight:800; }

  /* ---------- link/embed preview in insert modal ---------- */
  .link-preview-card{ margin-top:4px; }
  .lp-label{ font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--ink-soft); margin-bottom:6px; }
  .lp-hint{ font-size:11px; color:var(--ink-soft); margin-top:6px; }

  /* ---------- toast notifications ---------- */
  .toast-host{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:200;
    display:flex; flex-direction:column; gap:8px; align-items:center; pointer-events:none;
  }
  .toast{
    pointer-events:auto; display:flex; align-items:center; gap:12px;
    background:var(--ink); color:var(--paper); padding:11px 12px 11px 16px; border-radius:var(--radius);
    box-shadow:0 10px 30px rgba(0,0,0,0.28); font-size:13px; font-weight:500;
    animation:toastIn .2s ease; max-width:90vw;
  }
  .toast.out{ animation:toastOut .2s ease forwards; }
  @keyframes toastIn{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }
  @keyframes toastOut{ to{ opacity:0; transform:translateY(6px); } }
  .toast-msg{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .toast-action{
    background:var(--accent); color:var(--accent-contrast); border:none; border-radius:7px;
    padding:5px 11px; font-size:12px; font-weight:700; flex-shrink:0;
  }
  .toast-action:hover{ filter:brightness(1.1); }
  .toast-close{ background:none; border:none; color:rgba(255,255,255,0.5); font-size:11px; flex-shrink:0; padding:2px; }
  .toast-close:hover{ color:#fff; }

  .main{ flex:1; min-width:0; display:flex; flex-direction:column; }
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:22px 32px 10px;
  }
  .topbar h1{ font-family:var(--font-display); font-weight:600; font-size:26px; margin:0; }
  .topbar .sub{ color:var(--ink-soft); font-size:13px; margin-top:3px; }
  .topbar-actions{ display:flex; gap:8px; align-items:center; }
  .btn{
    display:inline-flex; align-items:center; gap:6px;
    background:var(--accent); color:var(--accent-contrast); border:none; border-radius:var(--radius);
    padding:9px 14px; font-size:13px; font-weight:600;
    box-shadow:var(--shadow);
  }
  .btn:hover{ filter:brightness(0.92); }
  .btn.secondary{ background:var(--paper-raised); color:var(--ink); border:1px solid var(--line); box-shadow:none; }
  .btn.secondary:hover{ background:var(--accent-soft); filter:none; }
  .btn.danger{ background:var(--danger); }
  .btn.icon-only{ padding:9px; }

  .content{ padding:8px 32px 60px; overflow:auto; }

  /* ---------- tiling panels ---------- */
  .view-panels{ display:flex; gap:4px; align-items:stretch; overflow-x:auto; padding-bottom:14px; min-height:200px; }
  .view-panel{
    flex:0 0 auto; width:480px; min-width:300px; max-width:100%;
    background:var(--panel-bg); border:1px solid var(--line); border-radius:var(--radius);
    padding:0 0 0; display:flex; flex-direction:column; position:relative; overflow:hidden;
  }
  .view-panels:has(.view-panel:only-child) .view-panel{ width:100% !important; background:transparent; border:none; }
  .view-panels:has(.view-panel:only-child) .panel-head{ background:transparent; border-bottom:none; padding:0 0 14px; }
  .view-panels:has(.view-panel:only-child) .panel-body{ padding:0; }
  .view-panels:has(.view-panel:only-child) .panel-head{ align-items:flex-start; }
  .view-panels:has(.view-panel:only-child) .panel-head h2{ font-family:var(--font-display); font-weight:600; font-size:18px; white-space:normal; }
  .view-panels:has(.view-panel:only-child) .panel-sub{ display:block; color:var(--ink-soft); font-size:12px; margin-top:3px; }
  .view-panels:has(.view-panel:only-child) .panel-drag-grip{ display:none; }
  .resize-handle{
    flex:0 0 10px; cursor:col-resize; position:relative; align-self:stretch;
    display:flex; align-items:center; justify-content:center;
  }
  .resize-handle::after{ content:''; width:3px; height:36px; background:var(--line); border-radius:3px; }
  .resize-handle:hover::after, .resize-handle.dragging::after{ background:var(--accent); }

  /* layout mode: grid (wraps both x and y, no horizontal scroll) */
  .view-panels.mode-grid{
    flex-wrap:wrap; overflow-x:visible; overflow-y:auto; align-items:flex-start;
  }
  .view-panels.mode-grid .view-panel{ flex:0 0 auto; width:440px; height:420px; max-width:100%; }
  .view-panels.mode-grid .resize-handle{ display:none; }
  .view-panels.mode-grid .panel-body{ max-height:none; }
  .view-panels.mode-grid .view-panel.grid-drop-target{ outline:2px dashed var(--accent); outline-offset:-2px; background:var(--accent-soft); }

  /* layout mode: free tiling (Windows-style, drag + resize, absolute positioning) */
  .view-panels.mode-free{
    position:relative; overflow:auto; display:block; min-height:240px; background:
      repeating-linear-gradient(0deg, transparent 0, transparent 23px, rgba(0,0,0,0.025) 24px),
      repeating-linear-gradient(90deg, transparent 0, transparent 23px, rgba(0,0,0,0.025) 24px);
  }
  .view-panels.mode-free .view-panel{
    position:absolute; width:420px; height:380px; max-width:none;
  }
  .view-panels.mode-free .panel-body{ height:auto; flex:1; }

  /* taskbar for free tiling mode: quick-focus chips so covered panels are always reachable */
  .tiling-taskbar{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
  .tiling-taskbar button{
    display:flex; align-items:center; gap:6px; background:var(--paper-raised); border:1px solid var(--line);
    border-radius:99px; padding:5px 12px 5px 8px; font-size:12px; font-weight:600; color:var(--ink-soft);
  }
  .tiling-taskbar button:hover{ color:var(--ink); border-color:var(--accent); }
  .tiling-taskbar button .tb-dot{ width:7px; height:7px; border-radius:99px; background:var(--accent); }

  /* resize grips (shared between grid and free modes) */
  .resize-grip{
    position:absolute; width:18px; height:18px; cursor:nwse-resize; z-index:5;
    display:flex; align-items:flex-end; justify-content:flex-end; right:2px; bottom:2px;
  }
  .resize-grip::after{
    content:''; width:11px; height:11px; border-right:3px solid var(--ink-soft); border-bottom:3px solid var(--ink-soft);
    opacity:0.45; border-radius:0 0 4px 0; transition:opacity .12s, border-color .12s;
  }
  .resize-grip:hover::after, .resize-grip.active::after{ opacity:1; border-color:var(--accent); }

  /* interaction highlights for tiling */
  .view-panel.tiling-active{
    box-shadow:0 0 0 2px var(--accent), 0 14px 36px rgba(0,0,0,0.22) !important; z-index:999 !important;
  }
  .view-panel.snap-match{ outline:2px solid var(--accent); outline-offset:-2px; }
  .snap-guide{ position:absolute; background:var(--accent); z-index:998; pointer-events:none; box-shadow:0 0 8px var(--accent); border-radius:2px; }
  .snap-guide.v{ width:2px; top:0; bottom:0; }
  .snap-guide.h{ height:2px; left:0; right:0; }
  .snap-edge-highlight{
    position:absolute; background:rgba(127,182,155,0.16); border:2px dashed var(--accent); z-index:997; pointer-events:none; border-radius:6px;
  }

  /* ---------- panel header (reworked: compact, icon, tooltip subtitle, focus/maximize/close) ---------- */
  .panel-head{
    display:flex; align-items:center; gap:8px; padding:11px 10px 11px 14px;
    background:var(--paper-raised); border-bottom:1px solid var(--line); flex-shrink:0;
  }
  .view-panels.mode-free .panel-head, .view-panels.mode-grid .panel-head{ cursor:move; }
  .panel-head.dragging{ opacity:0.5; }
  .panel-drag-grip{ display:flex; flex-direction:column; gap:2px; flex-shrink:0; opacity:0.35; }
  .panel-drag-grip span{ width:3px; height:3px; border-radius:99px; background:var(--ink); display:block; }
  .panel-drag-grip{ flex-flow:row wrap; width:8px; }
  .panel-icon{ font-size:15px; flex-shrink:0; }
  .panel-head h2{ font-family:var(--font-body); font-weight:600; font-size:13.5px; margin:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .panel-head-titles{ min-width:0; flex:1; cursor:help; }
  .panel-sub{ display:none; }
  .panel-head-actions{ display:flex; gap:5px; flex-shrink:0; }
  .panel-action-btn{ flex-shrink:0; background:transparent; border:1px solid transparent; border-radius:6px; width:24px; height:24px; display:flex; align-items:center; justify-content:center; color:var(--ink-soft); font-size:12px; }
  .panel-action-btn:hover{ background:var(--accent-soft); border-color:var(--line); color:var(--ink); }
  .panel-action-btn.panel-close:hover{ background:var(--danger); color:#fff; }
  .panel-body{ overflow:auto; min-width:0; flex:1; padding:14px 16px 16px; }

  /* ---------- item icon ---------- */
  .item-icon{ display:inline-flex; align-items:center; justify-content:center; font-size:15px; width:20px; flex-shrink:0; }
  .icon-picker{ display:flex; flex-wrap:wrap; gap:4px; max-width:280px; padding:8px; background:var(--paper-raised); border:1px solid var(--line); border-radius:10px; box-shadow:var(--shadow); position:absolute; z-index:60; }
  .icon-picker button{ background:transparent; border:none; font-size:18px; padding:4px; border-radius:6px; }
  .icon-picker button:hover{ background:var(--accent-soft); }
  .icon-trigger{ font-size:26px; width:48px; height:48px; display:flex; align-items:center; justify-content:center; border-radius:var(--radius); background:var(--accent-soft); border:1px solid var(--line); flex-shrink:0; }
  .icon-trigger:hover{ filter:brightness(0.96); }

  /* ---------- item page ---------- */
  .item-page{ max-width:760px; margin:0 auto; }
  .item-page .back-btn{ display:inline-flex; align-items:center; gap:6px; background:none; border:none; color:var(--ink-soft); font-size:13px; font-weight:600; margin-bottom:18px; padding:4px 2px; }
  .item-page .back-btn:hover{ color:var(--ink); }
  .item-page .page-head{ display:flex; gap:14px; align-items:flex-start; margin-bottom:18px; }
  .item-page .page-title{
    flex:1; font-family:var(--font-display); font-size:32px; font-weight:600; border:none; outline:none;
    background:transparent; width:100%; padding:4px 2px;
  }
  .item-page .page-title::placeholder{ color:#B7AF98; }
  .page-meta-row{ display:flex; flex-wrap:wrap; gap:18px; margin-bottom:22px; padding-bottom:18px; border-bottom:1px solid var(--line); }
  .page-meta-item{ display:flex; flex-direction:column; gap:4px; min-width:120px; }
  .page-meta-item label{ font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--ink-soft); }
  .page-meta-item select, .page-meta-item input{ border:1px solid var(--line); border-radius:var(--radius); padding:6px 8px; font-size:13px; background:var(--paper-raised); }
  .page-tags-input{ border:1px solid var(--line); border-radius:var(--radius); padding:6px 8px; font-size:13px; background:var(--paper-raised); min-width:180px; }

  .editor-toolbar{ display:flex; gap:6px; margin-bottom:8px; flex-wrap:wrap; }
  .editor-toolbar button{ background:var(--paper-raised); border:1px solid var(--line); border-radius:6px; padding:5px 9px; font-size:12px; color:var(--ink-soft); font-weight:600; }
  .editor-toolbar button:hover{ color:var(--ink); background:var(--accent-soft); }
  .editor-toolbar .spacer{ flex:1; }
  .editor-toolbar .seg{ display:flex; border:1px solid var(--line); border-radius:6px; overflow:hidden; }
  .editor-toolbar .seg button{ border:none; border-radius:0; background:var(--paper-raised); }
  .editor-toolbar .seg button.on{ background:var(--accent); color:var(--accent-contrast); }

  .md-editor{
    width:100%; min-height:280px; border:1px solid var(--line); border-radius:var(--radius); padding:14px;
    font-size:13.5px; font-family:var(--font-mono); resize:vertical; background:var(--paper-raised); line-height:1.6;
  }
  .md-preview{
    width:100%; min-height:280px; border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px;
    background:var(--paper-raised); line-height:1.65; overflow-x:auto;
  }
  .md-preview h1,.md-preview h2,.md-preview h3{ font-family:var(--font-display); margin:0.6em 0 0.3em; }
  .md-preview h1:first-child,.md-preview h2:first-child,.md-preview h3:first-child{ margin-top:0; }
  .md-preview p{ margin:0.5em 0; }
  .md-preview code{ background:var(--accent-soft); padding:1px 5px; border-radius:4px; font-family:var(--font-mono); font-size:0.9em; }
  .md-preview pre{ background:var(--ink); color:var(--paper); padding:12px 14px; border-radius:8px; overflow-x:auto; }
  .md-preview pre code{ background:none; color:inherit; padding:0; }
  .md-preview blockquote{ border-left:3px solid var(--accent); margin:0.6em 0; padding:2px 0 2px 12px; color:var(--ink-soft); }
  .md-preview ul,.md-preview ol{ padding-left:22px; }
  .md-preview img{ max-width:100%; border-radius:8px; margin:6px 0; }
  .md-preview table{ border-collapse:collapse; width:100%; margin:0.6em 0; }
  .md-preview th,.md-preview td{ border:1px solid var(--line); padding:6px 9px; font-size:13px; }
  .md-preview a{ font-weight:500; }
  .md-preview:empty::before{ content:'Nada por aqui ainda. Escreva algo no editor.'; color:var(--ink-soft); font-style:italic; }

  .embed-card{
    display:block; border:1px solid var(--line); border-radius:var(--radius); padding:12px 14px; margin:8px 0;
    background:var(--paper); text-decoration:none; color:var(--ink); transition:border-color .12s;
  }
  .embed-card:hover{ border-color:var(--accent); }
  .embed-card .e-url{ font-size:11px; color:var(--ink-soft); font-family:var(--font-mono); margin-bottom:3px; word-break:break-all; }
  .embed-card .e-title{ font-weight:600; font-size:13.5px; }
  .embed-card.preview{ padding:0; overflow:hidden; }
  .embed-card.preview iframe{ width:100%; height:320px; border:none; display:block; }
  .embed-card.preview .e-foot{ padding:10px 14px; border-top:1px solid var(--line); }

  /* ---------- settings modal ---------- */
  .settings-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:10px; margin-bottom:18px; }
  .theme-swatch{
    border:2px solid var(--line); border-radius:var(--radius); padding:10px; cursor:pointer; text-align:left;
  }
  .theme-swatch.active{ border-color:var(--ink); }
  .theme-swatch .sw-row{ display:flex; gap:4px; margin-bottom:7px; }
  .theme-swatch .sw-dot{ width:16px; height:16px; border-radius:5px; }
  .theme-swatch .sw-name{ font-size:11.5px; font-weight:600; }
  .font-options{ display:flex; flex-direction:column; gap:8px; margin-bottom:18px; }
  .font-options label{ font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--ink-soft); display:block; margin-bottom:4px; }
  .font-options select{ width:100%; border:1px solid var(--line); border-radius:7px; padding:8px 9px; background:var(--paper-raised); font-size:13.5px; }
  .settings-section{ margin-bottom:20px; }
  .settings-section h3{ display:flex; align-items:center; gap:6px; font-size:12.5px; text-transform:uppercase; letter-spacing:0.5px; color:var(--ink-soft); margin:0 0 10px; }
  .settings-section h3 svg{ flex-shrink:0; opacity:0.8; }
  .radius-row{ display:flex; gap:8px; }
  .radius-row button{ flex:1; background:var(--paper-raised); border:1px solid var(--line); border-radius:8px; padding:8px; font-size:12px; }
  .radius-row button.on{ border-color:var(--ink); background:var(--accent-soft); font-weight:600; }

  /* ---------- table view ---------- */
  table.db-table{ width:100%; border-collapse:collapse; background:var(--paper-raised); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); }
  table.db-table th{
    text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.5px;
    color:var(--ink-soft); font-weight:700; padding:10px 14px; border-bottom:1px solid var(--line);
    background:var(--accent-soft);
  }
  table.db-table td{ padding:9px 14px; border-bottom:1px solid var(--line); vertical-align:middle; font-size:13.5px; }
  table.db-table tr:last-child td{ border-bottom:none; }
  table.db-table tr:hover{ background:var(--accent-soft); }
  td.title-cell{ font-weight:500; cursor:pointer; display:flex; align-items:center; gap:8px; }
  td.title-cell:hover{ text-decoration:underline; text-decoration-color:var(--line); }
  .row-add{ padding:10px 14px; font-size:13px; color:var(--ink-soft); cursor:pointer; border-top:1px dashed var(--line); }
  .row-add:hover{ color:var(--ink); background:var(--accent-soft); }

  .status-chip{ display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; padding:3px 9px; border-radius:99px; white-space:nowrap; }
  .status-chip.todo{ background:var(--gold-soft); color:#8A641E; }
  .status-chip.doing{ background:#E3EAF6; color:#2F4F8A; }
  .status-chip.done{ background:var(--accent-soft); color:var(--accent); }
  .priority-tag{ font-size:11px; font-weight:600; }
  .priority-tag.alta{ color:var(--clay); }
  .priority-tag.media{ color:var(--gold); }
  .priority-tag.baixa{ color:var(--ink-soft); }
  .tag-chip{ display:inline-block; font-size:10.5px; background:var(--clay-soft); color:#9C4A2A; padding:2px 7px; border-radius:99px; margin:1px 3px 1px 0; font-weight:600; }
  .empty-state{ text-align:center; padding:70px 20px; color:var(--ink-soft); }
  .empty-state .big{ font-family:var(--font-display); font-size:19px; color:var(--ink); margin-bottom:6px; }

  /* ---------- kanban ---------- */
  .board{ display:flex; gap:16px; align-items:flex-start; }
  .board-col{ background:var(--paper); border-radius:var(--radius); padding:12px; width:280px; flex-shrink:0; min-height:120px; border:1px solid var(--line); }
  .board-col.drag-over{ outline:2px dashed var(--accent); outline-offset:-2px; }
  .board-col h3{ font-size:12.5px; font-weight:700; margin:2px 4px 10px; display:flex; align-items:center; gap:7px; text-transform:uppercase; letter-spacing:0.4px; color:var(--ink-soft); }
  .board-col h3 .n{ background:var(--paper-raised); border-radius:99px; padding:1px 7px; font-size:11px; font-family:var(--font-mono); }
  .card{
    background:var(--paper-raised); border-radius:var(--radius); padding:11px 12px; margin-bottom:9px;
    box-shadow:var(--shadow); cursor:grab; border:1px solid transparent;
  }
  .card:hover{ border-color:var(--line); }
  .card .ctitle{ font-weight:600; font-size:13.5px; margin-bottom:6px; display:flex; align-items:center; gap:7px; }
  .card .cmeta{ display:flex; flex-wrap:wrap; gap:5px; align-items:center; font-size:11px; color:var(--ink-soft); }
  .card .cdate{ font-family:var(--font-mono); }
  .add-card-btn{ width:100%; text-align:left; background:transparent; border:none; color:var(--ink-soft); font-size:12.5px; padding:7px 6px; border-radius:7px; }
  .add-card-btn:hover{ background:var(--accent-soft); color:var(--ink); }

  /* ---------- calendar ---------- */
  .cal-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .cal-head h2{ font-family:var(--font-display); font-size:19px; margin:0; font-weight:600; text-transform:capitalize; }
  .cal-nav{ display:flex; gap:6px; }
  .icon-btn{ background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius); padding:6px 9px; }
  .icon-btn:hover{ background:var(--accent-soft); }
  .cal-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:7px; }
  .cal-dow{ font-size:10.5px; font-weight:700; text-transform:uppercase; color:var(--ink-soft); text-align:center; padding-bottom:4px; letter-spacing:0.5px; }
  .cal-day{
    background:var(--paper-raised); border-radius:var(--radius); min-height:96px; padding:7px;
    border:1px solid var(--line); display:flex; flex-direction:column; gap:4px;
  }
  .cal-day.othermonth{ opacity:0.4; }
  .cal-day.today{ border-color:var(--accent); box-shadow:0 0 0 1px var(--accent) inset; }
  .cal-day .dnum{ font-size:11.5px; font-weight:700; font-family:var(--font-mono); color:var(--ink-soft); display:flex; justify-content:space-between; }
  .cal-day .dnum button{ background:none; border:none; color:var(--ink-soft); font-size:13px; opacity:0; }
  .cal-day:hover .dnum button{ opacity:1; }
  .cal-item{ font-size:10.5px; padding:2px 6px; border-radius:5px; background:var(--accent-soft); color:var(--accent); font-weight:600; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:flex; align-items:center; gap:3px; }
  .cal-item.todo{ background:var(--gold-soft); color:#8A641E; }
  .cal-item.doing{ background:#E3EAF6; color:#2F4F8A; }

  /* ---------- checklist ---------- */
  .check-group{ margin-bottom:22px; }
  .check-group h3{ font-size:12px; text-transform:uppercase; letter-spacing:0.5px; color:var(--ink-soft); margin:0 0 8px 2px; }
  .check-row{
    display:flex; align-items:center; gap:11px; background:var(--paper-raised);
    border-radius:var(--radius); padding:10px 12px; margin-bottom:7px; box-shadow:var(--shadow);
  }
  .check-row.done .ctitle{ text-decoration:line-through; color:var(--ink-soft); }
  .checkbox{
    width:18px; height:18px; border-radius:5px; border:1.5px solid var(--line);
    flex-shrink:0; display:flex; align-items:center; justify-content:center; background:var(--paper-raised);
  }
  .checkbox.checked{ background:var(--accent); border-color:var(--accent); color:var(--accent-contrast); }
  .check-row .ctitle{ flex:1; font-size:13.5px; font-weight:500; display:flex; align-items:center; gap:8px; }
  .check-row .cdate{ font-size:11px; color:var(--ink-soft); font-family:var(--font-mono); }

  /* ---------- quick modal (used only for new item from + buttons) ---------- */
  .overlay{ position:fixed; inset:0; background:rgba(20,20,16,0.4); display:flex; align-items:flex-start; justify-content:center; padding:6vh 20px; z-index:80; overflow:auto;}
  .modal{ background:var(--paper-raised); border-radius:var(--radius); width:560px; max-width:100%; box-shadow:0 20px 60px rgba(0,0,0,0.3); padding:26px 28px 22px; position:relative; }
  .modal h2{ margin:0 0 16px; font-family:var(--font-display); }
  .field-row{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
  .field{ display:flex; flex-direction:column; gap:4px; flex:1; min-width:130px; }
  .field label{ font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--ink-soft); }
  .field input, .field select{
    border:1px solid var(--line); border-radius:var(--radius); padding:7px 9px; font-size:13px; background:var(--paper);
  }
  .modal-foot{ display:flex; justify-content:space-between; align-items:center; margin-top:6px; }
  .modal .right-btns{ display:flex; gap:8px; }
  .close-x{ position:absolute; top:18px; right:18px; background:none; border:none; font-size:18px; color:var(--ink-soft); }
  .modal-title-input{
    width:100%; border:none; outline:none; font-family:var(--font-display); font-size:22px; font-weight:600;
    margin-bottom:14px; background:transparent;
  }

  @media (max-width:820px){
    .sidebar{ display:none; }
    .content, .topbar{ padding-left:16px; padding-right:16px; }
    .view-panel{ width:100% !important; }
  }
</style>
</head>
<body>

<div id="app">

<script>
/* ============================ THEMES ============================ */
const THEMES = {
  bosque:{ name:'Bosque', paper:'#FAF6EE', paperRaised:'#FFFFFF', ink:'#20281F', inkSoft:'#5B6358', line:'#E4DDC9', accent:'#3F6657', accentSoft:'#E7EFE9', accentContrast:'#FFFFFF', panel:'#F3EFE2' },
  noturno:{ name:'Noturno', paper:'#181C19', paperRaised:'#21261F', ink:'#EDEDE3', inkSoft:'#9AA398', line:'#333A31', accent:'#7FB69B', accentSoft:'#2A3A30', accentContrast:'#102018', panel:'#1E231D' },
  oceano:{ name:'Oceano', paper:'#F3F7FA', paperRaised:'#FFFFFF', ink:'#1C2B36', inkSoft:'#5B7282', line:'#D9E4EA', accent:'#2A6F8E', accentSoft:'#E2EFF4', accentContrast:'#FFFFFF', panel:'#E9F1F5' },
  ameixa:{ name:'Ameixa', paper:'#F8F3F7', paperRaised:'#FFFFFF', ink:'#2C1F2A', inkSoft:'#6E5A6A', line:'#E6D8E2', accent:'#83406E', accentSoft:'#F1E3EC', accentContrast:'#FFFFFF', panel:'#F0E6ED' },
  carvao:{ name:'Carvão', paper:'#F4F4F2', paperRaised:'#FFFFFF', ink:'#1B1B1A', inkSoft:'#62615C', line:'#DDDCD5', accent:'#C2643F', accentSoft:'#F6E3D7', accentContrast:'#FFFFFF', panel:'#EAE9E2' },
  meianoite:{ name:'Meia-noite', paper:'#10131C', paperRaised:'#171B27', ink:'#E7E9F2', inkSoft:'#9398AC', line:'#2B3043', accent:'#7C8CF8', accentSoft:'#242A47', accentContrast:'#FFFFFF', panel:'#151926' }
};
const FONT_DISPLAY = { fraunces:"'Fraunces', serif", sora:"'Sora', sans-serif", lora:"'Lora', serif", grotesk:"'Space Grotesk', sans-serif" };

const SETTINGS_KEY = 'vida_settings_v1';
function loadSettings(){
  try{
    const raw = localStorage.getItem(SETTINGS_KEY);
    if(raw) return {...defaultSettings(), ...JSON.parse(raw)};
  }catch(e){}
  return defaultSettings();
}
function defaultSettings(){ return { theme:'bosque', fontDisplay:'fraunces', fontBody:'inter', fontMono:'jetbrains', radius:10,
  sidebarMode:'fixed', sidebarSide:'left', layoutMode:'scroll', freeTilingEnabled:false, freeTilingSnap:true,
  sync:{ enabled:true, url:location.origin, token:'', autoSync:true, lastSync:null } }; }
let SETTINGS = loadSettings();
function saveSettings(){ localStorage.setItem(SETTINGS_KEY, JSON.stringify(SETTINGS)); }
const ALLOWED_SIDES = { fixed:['left','right','top','bottom'], floating:['left','right'], 'fixed-expand':['top','bottom'] };
function clampSidebarSide(){
  const allowed = ALLOWED_SIDES[SETTINGS.sidebarMode] || ALLOWED_SIDES.fixed;
  if(!allowed.includes(SETTINGS.sidebarSide)){ SETTINGS.sidebarSide = allowed[0]; }
}
function applyTheme(){
  clampSidebarSide();
  const t = THEMES[SETTINGS.theme] || THEMES.bosque;
  const r = document.documentElement.style;
  r.setProperty('--paper', t.paper);
  r.setProperty('--paper-raised', t.paperRaised);
  r.setProperty('--ink', t.ink);
  r.setProperty('--ink-soft', t.inkSoft);
  r.setProperty('--line', t.line);
  r.setProperty('--accent', t.accent);
  r.setProperty('--accent-soft', t.accentSoft);
  r.setProperty('--accent-contrast', t.accentContrast);
  r.setProperty('--panel-bg', t.panel);
  r.setProperty('--font-display', FONT_DISPLAY[SETTINGS.fontDisplay]);
  r.setProperty('--font-body', FONT_BODY[SETTINGS.fontBody]);
  r.setProperty('--font-mono', FONT_MONO[SETTINGS.fontMono]);
  r.setProperty('--radius', SETTINGS.radius+'px');

  document.body.classList.remove('sb-fixed-left','sb-fixed-right','sb-fixed-top','sb-fixed-bottom','sb-floating','sb-fixed-expand','sb-side-left','sb-side-right','sb-side-top','sb-side-bottom','sb-horizontal');
  const side = SETTINGS.sidebarSide;
  if(SETTINGS.sidebarMode==='floating'){
    document.body.classList.add('sb-floating', 'sb-side-'+side);
  } else if(SETTINGS.sidebarMode==='fixed-expand'){
    document.body.classList.add('sb-fixed-expand', 'sb-side-'+side);
  } else {
    document.body.classList.add('sb-fixed-'+side);
  }
  if(side==='top' || side==='bottom') document.body.classList.add('sb-horizontal');
}
applyTheme();

/* ============================ HELPERS ============================ */
function isOverdue(it){
  return it.date && it.date < todayIso() && it.status !== 'done';
}
function todayIso(){ return new Date().toISOString().slice(0,10); }
function getFiltered(){
  return DB.filter(it=>{
    if(activeTagFilter && !(it.tags||[]).includes(activeTagFilter)) return false;
    if(activeStatusFilter && it.status !== activeStatusFilter) return false;
    if(overdueOnlyFilter && !isOverdue(it)) return false;
    if(searchQuery){
      const q = searchQuery.toLowerCase();
      const hay = (it.title+' '+(it.content||'')+' '+(it.tags||[]).join(' ')).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}
function sortPinnedFirst(items){
  return [...items].sort((a,b)=> (b.pinned?1:0)-(a.pinned?1:0));
}
function allTags(){
  const s = new Set();
  DB.forEach(it=>(it.tags||[]).forEach(t=>s.add(t)));
  return [...s].sort();
}
function statusLabel(id){ return (STATUSES.find(s=>s.id===id)||{}).label || id; }
function fmtDateHuman(iso){
  if(!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
function relDate(iso){
  if(!iso) return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const [y,m,d] = iso.split('-').map(Number);
  const target = new Date(y, m-1, d);
  const diffDays = Math.round((target-today)/86400000);
  if(diffDays===0) return {label:'Hoje', cls:'today'};
  if(diffDays===1) return {label:'Amanhã', cls:'soon'};
  if(diffDays===-1) return {label:'Ontem', cls:'overdue'};
  if(diffDays<-1) return {label:`Atrasado ${Math.abs(diffDays)}d`, cls:'overdue'};
  if(diffDays>1 && diffDays<=6) return {label:`Em ${diffDays} dias`, cls:'soon'};
  return null;
}
function relDateBadge(iso, status){
  const r = relDate(iso);
  if(!r) return '';
  if(status==='done') return '';
  return `<span class="rel-date ${r.cls}">${r.label}</span>`;
}
function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function persistAndRender(){ saveDB(DB); render(); }
function iconOf(it){ return it.icon ? `<span class="item-icon">${it.icon}</span>` : ''; }
function pinBtn(it){ return `<button class="pin-btn ${it.pinned?'active':''}" data-pin="${it.id}" title="${it.pinned?'Desafixar':'Fixar no topo'}">${it.pinned?'★':'☆'}</button>`; }
function togglePin(id){
  const it = DB.find(d=>d.id===id);
  if(!it) return;
  it.pinned = !it.pinned;
  persistAndRender();
}
function deleteItemWithUndo(id){
  const idx = DB.findIndex(d=>d.id===id);
  if(idx===-1) return;
  const [removed] = DB.splice(idx,1);
  saveDB(DB);
  showToast(`"${removed.title||'Item'}" excluído`, {
    actionLabel:'Desfazer',
    duration:6000,
    onAction:()=>{
      DB.splice(idx,0,removed);
      persistAndRender();
    }
  });
}

/* ============================ MARKDOWN + EMBEDS ENGINE ============================ */
// Custom embed syntax inside markdown content:
//   {{embed: https://...}}        -> link card with live preview (iframe attempt)
//   {{link: https://... | Texto}} -> simple link, no preview
// Equations use $...$ and $$...$$ (rendered by KaTeX after markdown -> HTML).
function preprocessEmbeds(md){
  md = md.replace(/\{\{embed:\s*(\S+?)\s*\}\}/g, (m,url)=>{
    return `<div class="embed-card preview"><iframe src="${escapeHtml(url)}" loading="lazy" referrerpolicy="no-referrer" sandbox="allow-scripts allow-same-origin allow-popups"></iframe><div class="e-foot"><div class="e-url">${escapeHtml(url)}</div><a href="${escapeHtml(url)}" target="_blank" rel="noopener">Abrir em nova aba ↗</a></div></div>`;
  });
  md = md.replace(/\{\{link:\s*(\S+?)\s*\|\s*(.+?)\s*\}\}/g, (m,url,label)=>{
    return `<a class="embed-card" href="${escapeHtml(url)}" target="_blank" rel="noopener"><div class="e-url">${escapeHtml(url)}</div><div class="e-title">🔗 ${escapeHtml(label)}</div></a>`;
  });
  md = md.replace(/\{\{link:\s*(\S+?)\s*\}\}/g, (m,url)=>{
    return `<a class="embed-card" href="${escapeHtml(url)}" target="_blank" rel="noopener"><div class="e-url">${escapeHtml(url)}</div><div class="e-title">🔗 Abrir link</div></a>`;
  });
  return md;
}
function renderMarkdown(md, targetEl){
  md = md || '';
  // protect $$...$$ and $...$ from markdown engine by stashing them
  const mathStash = [];
  md = md.replace(/\$\$([\s\S]+?)\$\$/g, (m,expr)=>{ mathStash.push({block:true, expr}); return `@@MATH${mathStash.length-1}@@`; });
  md = md.replace(/\$([^\$\n]+?)\$/g, (m,expr)=>{ mathStash.push({block:false, expr}); return `@@MATH${mathStash.length-1}@@`; });
  md = preprocessEmbeds(md);
  let html;
  try{
    html = (typeof marked !== 'undefined') ? marked.parse(md) : md.replace(/\n/g,'<br>');
  }catch(e){ html = md.replace(/\n/g,'<br>'); }
  html = html.replace(/@@MATH(\d+)@@/g, (m,i)=>`<span class="math-slot" data-math="${i}"></span>`);
  targetEl.innerHTML = html;
  targetEl.querySelectorAll('.math-slot').forEach(slot=>{
    const data = mathStash[+slot.dataset.math];
    if(!data) return;
    try{
      if(typeof katex !== 'undefined'){
        katex.render(data.expr, slot, { throwOnError:false, displayMode:data.block });
      } else {
        slot.textContent = (data.block?'$$':'$') + data.expr + (data.block?'$$':'$');
      }
    }catch(e){ slot.textContent = data.expr; }
  });
}

/* ============================ CALENDAR VIEW ============================ */
const MONTHS = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
const DOWS = ['dom','seg','ter','qua','qui','sex','sáb'];

function renderCalendario(container){
  const items = getFiltered();
  const y = calCursor.getFullYear(), m = calCursor.getMonth();
  const firstDay = new Date(y,m,1);
  const startOffset = firstDay.getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const daysInPrevMonth = new Date(y,m,0).getDate();
  const todayIso = new Date().toISOString().slice(0,10);

  let cells = [];
  for(let i=startOffset-1;i>=0;i--) cells.push({day:daysInPrevMonth-i, other:true, iso:null});
  for(let d=1; d<=daysInMonth; d++){
    const iso = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells.push({day:d, other:false, iso});
  }
  while(cells.length % 7 !== 0 || cells.length < 42) cells.push({day:cells.length, other:true, iso:null});

  container.innerHTML = `
    <div class="cal-head">
      <h2>${MONTHS[m]} ${y}</h2>
      <div class="cal-nav">
        <button class="icon-btn" data-act="prev" title="Mês anterior">${ICO.chevronLeft}</button>
        <button class="icon-btn" data-act="today">Hoje</button>
        <button class="icon-btn" data-act="next" title="Próximo mês">${ICO.chevronRight}</button>
      </div>
    </div>
    <div class="cal-grid">
      ${DOWS.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
      ${cells.map(c=>{
        if(c.other) return `<div class="cal-day othermonth"><div class="dnum">${c.day}</div></div>`;
        const dayItems = items.filter(i=>i.date===c.iso);
        return `<div class="cal-day ${c.iso===todayIso?'today':''}" data-date="${c.iso}">
          <div class="dnum">${c.day}<button data-quickadd="${c.iso}">+</button></div>
          ${dayItems.slice(0,4).map(it=>`<div class="cal-item ${it.status}" data-open="${it.id}">${it.icon?it.icon+' ':''}${escapeHtml(it.title)}</div>`).join('')}
          ${dayItems.length>4?`<div style="font-size:10px;color:var(--ink-soft)">+${dayItems.length-4} mais</div>`:''}
        </div>`;
      }).join('')}
    </div>
  `;
  container.querySelector('[data-act="prev"]').onclick = ()=>{ calCursor.setMonth(calCursor.getMonth()-1); render(); };
  container.querySelector('[data-act="next"]').onclick = ()=>{ calCursor.setMonth(calCursor.getMonth()+1); render(); };
  container.querySelector('[data-act="today"]').onclick = ()=>{ calCursor = new Date(); render(); };
  container.querySelectorAll('[data-quickadd]').forEach(b=> b.onclick = (e)=>{ e.stopPropagation(); quickCreate({date:b.dataset.quickadd}); });
  container.querySelectorAll('[data-open]').forEach(el=> el.onclick = (e)=>{ e.stopPropagation(); openItemPage(el.dataset.open); });
}

/* ============================ CHECKLIST VIEW ============================ */
function renderTarefas(container){
  const items = getFiltered();
  if(items.length===0){ container.innerHTML = emptyStateHtml(); bindEmptyState(container); return; }
  const groups = STATUSES.map(s=>({...s, items:sortPinnedFirst(items.filter(i=>i.status===s.id))}));
  container.innerHTML = groups.map(g=>{
    if(g.items.length===0) return '';
    return `
      <div class="check-group">
        <h3>${g.label} · ${g.items.length}</h3>
        ${g.items.map(it=>`
          <div class="check-row ${it.status==='done'?'done':''} ${it.pinned?'pinned-row':''}" data-id="${it.id}">
            <div class="checkbox ${it.status==='done'?'checked':''}" data-toggle="${it.id}">${it.status==='done'?'✓':''}</div>
            ${pinBtn(it)}
            <div class="ctitle" data-open="${it.id}">${iconOf(it)}${escapeHtml(it.title)||'<i>Sem título</i>'}</div>
            ${it.date?`<div class="cdate">${fmtDateHuman(it.date)} ${relDateBadge(it.date, it.status)}</div>`:''}

      </div>`;
  }).join('') + `<button class="ghost-btn" id="addTask" style="margin-top:4px;">${ICO.plus} Adicionar tarefa</button>`;

        </div>
      </div>

      <div class="editor-toolbar">
        <div class="seg">
          <button data-mode="edit" class="on">✎ Editar</button>
          <button data-mode="preview">👁 Visualizar</button>
        </div>
        <button id="btnBold" title="Negrito">B</button>
        <button id="btnItalic" title="Itálico"><i>I</i></button>
        <button id="btnH2" title="Título">H2</button>
        <button id="btnEq" title="Equação inline">∑ eq</button>
        <button id="btnEqBlock" title="Equação em bloco">∑∑ bloco</button>
        <button id="btnLink" title="Inserir link com preview">🔗 embed</button>
        <button id="btnLinkPlain" title="Inserir link simples">🔗 link</button>
        <button id="btnImage" title="Inserir imagem do computador">🖼 imagem</button>
        <input type="file" id="imageFile" accept="image/*" style="display:none">
        <div class="spacer"></div>
      </div>
      <textarea class="md-editor" id="pgEditor" placeholder="Escreva em markdown... use **negrito**, # títulos, $x^2$ para equações, {{embed: url}} para incorporar um link.">${escapeHtml(it.content||'')}</textarea>
      <div class="md-preview" id="pgPreview" style="display:none;"></div>
    </div>
  `;

  const editor = container.querySelector('#pgEditor');
  const preview = container.querySelector('#pgPreview');
  const setMode = (mode)=>{
    mdMode = mode;
    container.querySelectorAll('.seg button').forEach(b=> b.classList.toggle('on', b.dataset.mode===mode));
    if(mode==='preview'){
      renderMarkdown(editor.value, preview);
      editor.style.display='none'; preview.style.display='block';
    } else {
      editor.style.display='block'; preview.style.display='none';
    }
  };
  container.querySelectorAll('.seg button').forEach(b=> b.onclick = ()=> setMode(b.dataset.mode));

  const saveField = ()=>{
    it.title = container.querySelector('#pgTitle').value.trim() || 'Sem título';
    it.status = container.querySelector('#pgStatus').value;
    it.date = container.querySelector('#pgDate').value;
    it.priority = container.querySelector('#pgPriority').value;
    it.tags = container.querySelector('#pgTags').value.split(',').map(t=>t.trim()).filter(Boolean);
    it.content = editor.value;
    saveDB(DB);
  };
  container.querySelector('#pgTitle').oninput = saveField;
  container.querySelector('#pgStatus').onchange = ()=>{ saveField(); renderSidebar(); };
  container.querySelector('#pgDate').onchange = saveField;
  container.querySelector('#pgPriority').onchange = saveField;
  container.querySelector('#pgTags').oninput = ()=>{ saveField(); renderSidebar(); };
  editor.oninput = saveField;

  container.querySelector('#backBtn').onclick = ()=>{ openItemId = null; render(); };
  container.querySelector('#pgDelete').onclick = ()=>{
    deleteItemWithUndo(it.id);
    openItemId = null;
    render();
  };

  // icon picker
  container.querySelector('#iconTrigger').onclick = (e)=>{
    e.stopPropagation();
    const existing = document.querySelector('.icon-picker');
    if(existing){ existing.remove(); return; }
    const pop = document.createElement('div');
    pop.className = 'icon-picker';
    const r = e.target.getBoundingClientRect();
    pop.style.top = (r.bottom+window.scrollY+6)+'px';
    pop.style.left = (r.left+window.scrollX)+'px';
    pop.innerHTML = ICON_CHOICES.map(ic=>`<button data-ic="${ic}">${ic}</button>`).join('') + `<button data-ic="">✕</button>`;
    document.body.appendChild(pop);
    pop.querySelectorAll('button').forEach(b=> b.onclick = ()=>{
      it.icon = b.dataset.ic;
      saveDB(DB);
      pop.remove();
      render();
    });
    setTimeout(()=> document.addEventListener('click', function h(){ pop.remove(); document.removeEventListener('click',h); }), 0);
  };

  // markdown toolbar actions
  function wrapSelection(before, after){
    after = after===undefined?before:after;
    const s = editor.selectionStart, e = editor.selectionEnd;
    const val = editor.value;
    editor.value = val.slice(0,s) + before + val.slice(s,e) + after + val.slice(e);
    editor.focus();
    editor.selectionStart = s+before.length; editor.selectionEnd = e+before.length;
    saveField();
  }
  function insertAtCursor(text){
    const s = editor.selectionStart;
    const val = editor.value;
    editor.value = val.slice(0,s) + text + val.slice(s);
    editor.focus();
    editor.selectionStart = editor.selectionEnd = s+text.length;
    saveField();
  }
  container.querySelector('#btnBold').onclick = ()=> wrapSelection('**');
  container.querySelector('#btnItalic').onclick = ()=> wrapSelection('_');
  container.querySelector('#btnH2').onclick = ()=> insertAtCursor('\n## ');
  container.querySelector('#btnEq').onclick = ()=> wrapSelection('$');
  container.querySelector('#btnEqBlock').onclick = ()=> insertAtCursor('\n$$\nE = mc^2\n$$\n');
  container.querySelector('#btnLink').onclick = ()=> openLinkInsertModal('embed', insertAtCursor);
  container.querySelector('#btnLinkPlain').onclick = ()=> openLinkInsertModal('link', insertAtCursor);
  container.querySelector('#btnImage').onclick = ()=> container.querySelector('#imageFile').click();
  container.querySelector('#imageFile').onchange = (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      insertAtCursor(`\n![${file.name}](${reader.result})\n`);
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  };
}

/* ============================ LINK / EMBED INSERT MODAL ============================ */
function openLinkInsertModal(kind, insertFn){
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  const isEmbed = kind==='embed';
  overlay.innerHTML = `
    <div class="modal" style="width:480px;">
      <button class="close-x" id="lClose">✕</button>
      <h2>${isEmbed?'Incorporar link (com preview)':'Inserir link simples'}</h2>
      <div class="field" style="margin-bottom:12px;">
        <label>URL</label>
        <input id="lUrl" placeholder="https://exemplo.com" autocomplete="off">
      </div>
      ${!isEmbed?`<div class="field" style="margin-bottom:12px;"><label>Texto do link</label><input id="lLabel" placeholder="Texto a exibir" autocomplete="off"></div>`:''}
      <div id="lPreviewWrap"></div>
      <div class="modal-foot">
        <div></div>
        <div class="right-btns">
          <button class="btn secondary" id="lCancel">Cancelar</button>
          <button class="btn" id="lInsert" disabled>Inserir</button>
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  const close = ()=> overlay.remove();
  overlay.addEventListener('click', e=>{ if(e.target===overlay) close(); });
  overlay.querySelector('#lClose').onclick = close;
  overlay.querySelector('#lCancel').onclick = close;

  const urlInput = overlay.querySelector('#lUrl');
  const labelInput = overlay.querySelector('#lLabel');
  const previewWrap = overlay.querySelector('#lPreviewWrap');
  const insertBtn = overlay.querySelector('#lInsert');

  function isValidUrl(v){
    try{ const u = new URL(v); return u.protocol==='http:'||u.protocol==='https:'; }catch(e){ return false; }
  }
  function updatePreview(){
    const v = urlInput.value.trim();
    if(!isValidUrl(v)){ previewWrap.innerHTML = ''; insertBtn.disabled = true; return; }
    insertBtn.disabled = false;
    let domain = '';
    try{ domain = new URL(v).hostname; }catch(e){}
    if(isEmbed){
      previewWrap.innerHTML = `
        <div class="link-preview-card">
          <div class="lp-label">Pré-visualização do embed:</div>
          <div class="embed-card preview" style="margin:0;">
            <iframe src="${escapeHtml(v)}" loading="lazy" referrerpolicy="no-referrer" sandbox="allow-scripts allow-same-origin allow-popups"></iframe>
            <div class="e-foot"><div class="e-url">${escapeHtml(v)}</div></div>
          </div>
          <div class="lp-hint">Se a página não aparecer acima, o site bloqueia incorporação — mesmo assim o link "Abrir em nova aba" continuará funcionando.</div>
        </div>`;
    } else {
      if(!labelInput.value) labelInput.value = domain;
      previewWrap.innerHTML = `
        <div class="link-preview-card">
          <div class="lp-label">Pré-visualização:</div>
          <a class="embed-card" href="${escapeHtml(v)}" target="_blank" rel="noopener" style="margin:0;">
            <div class="e-url">${escapeHtml(v)}</div>
            <div class="e-title"><img src="https://www.google.com/s2/favicons?sz=32&domain=${escapeHtml(domain)}" width="14" height="14" style="vertical-align:-2px;border-radius:3px;"> ${escapeHtml(labelInput.value || domain)}</div>
          </a>
        </div>`;
    }
  }
  urlInput.oninput = updatePreview;
  if(labelInput) labelInput.oninput = updatePreview;

  insertBtn.onclick = ()=>{
    const v = urlInput.value.trim();
    if(!isValidUrl(v)) return;
    if(isEmbed){
      insertFn(`\n{{embed: ${v}}}\n`);
    } else {
      const label = (labelInput.value.trim()) || v;
      insertFn(`{{link: ${v} | ${label}}}`);
    }
    close();
  };
  setTimeout(()=> urlInput.focus(), 30);
}

function importJsonFile(file){

  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const parsed = JSON.parse(reader.result);
      if(Array.isArray(parsed)){ DB = parsed; persistAndRender(); showToast('Backup importado com sucesso.'); }
      else showToast('Arquivo inválido.');
    }catch(err){ showToast('Não foi possível ler o arquivo.'); }
  };
  reader.readAsText(file);
}

/* ============================ TOAST NOTIFICATIONS ============================ */
function showToast(message, opts){
  opts = opts || {};
  let host = document.getElementById('toastHost');
  if(!host){
    host = document.createElement('div');
    host.id = 'toastHost';
    host.className = 'toast-host';
    document.body.appendChild(host);
  }
  const toast = document.createElement('div');
  toast.className = 'toast';
  const dur = opts.duration || 4500;
  toast.innerHTML = `<span class="toast-msg">${escapeHtml(message)}</span>`;
  if(opts.actionLabel){
    const btn = document.createElement('button');
    btn.className = 'toast-action';
    btn.textContent = opts.actionLabel;
    btn.onclick = ()=>{ if(opts.onAction) opts.onAction(); dismiss(); };
    toast.appendChild(btn);
  }
  const closeBtn = document.createElement('button');
  closeBtn.className = 'toast-close';
  closeBtn.textContent = '✕';
  closeBtn.onclick = ()=> dismiss();
  toast.appendChild(closeBtn);
  host.appendChild(toast);
  let timer = setTimeout(dismiss, dur);
  function dismiss(){
    clearTimeout(timer);
    toast.classList.add('out');
    setTimeout(()=> toast.remove(), 200);
  }
  return { dismiss };
}

const TITLES = {

let dragPanelView = null;
let panelLayout = {}; // free-tiling positions, keyed by combo: { "combo::view": {x,y,w,h} }
let panelGridSize = {}; // grid-mode sizes, keyed by combo: { "combo::view": {w,h} }
function comboKeyFor(list, view){
  return list.slice().sort().join(',') + '::' + view;
}
function loadPanelLayout(){

}
function savePanelLayout(){ localStorage.setItem('vida_panel_layout_v1', JSON.stringify(panelLayout)); }
function savePanelGridSize(){ localStorage.setItem('vida_panel_grid_v1', JSON.stringify(panelGridSize)); }
function savePanelWidths(){ localStorage.setItem('vida_panel_widths_v1', JSON.stringify(panelWidths)); }

function render(){
  if(openItemId){
    document.getElementById('viewTitle').textContent = '';
    document.getElementById('viewSub').textContent = '';

    container.innerHTML = '';
    renderItemPage(container, openItemId);
    if(window.renderMathInElement){
      try{ renderMathInElement(container, {delimiters:[]}); }catch(e){}
    }
    renderSidebar();
    return;
  }

  if(activeViews.size===0) activeViews.add('tabela');
  const baseOrder = (customViewOrder && customViewOrder.every(v=>activeViews.has(v)) && customViewOrder.length===activeViews.size) ? customViewOrder : VIEW_ORDER;
  const list = baseOrder.filter(v=>activeViews.has(v));
  const freeMode = SETTINGS.freeTilingEnabled && list.length>1;
  const gridMode = !freeMode && SETTINGS.layoutMode==='grid';

  document.getElementById('viewTitle').textContent = list.length===1 ? TITLES[list[0]][0] : `${list.length} visões abertas`;
  document.getElementById('viewSub').textContent = list.length===1 ? TITLES[list[0]][1]
    : freeMode ? `Tiling livre: arraste pelo título para mover, pela alça no canto para redimensionar.${SETTINGS.freeTilingSnap?' Snapping ativado.':''}`
    : gridMode ? 'Modo grade: os painéis preenchem a tela em linhas e colunas — arraste a alça no canto para redimensionar cada um.'
    : 'Arraste o título de um painel para reordenar, ou a borda para redimensionar.';

  const container = document.getElementById('content');
  container.innerHTML = `<div class="view-panels" id="viewPanels"></div>`;
  const wrap = document.getElementById('viewPanels');
  wrap.classList.toggle('mode-free', freeMode);
  wrap.classList.toggle('mode-grid', gridMode);

  if(freeMode && list.length>1){
    const taskbar = document.createElement('div');
    taskbar.className = 'tiling-taskbar';
    taskbar.innerHTML = list.map(v=>`<button data-focus="${v}"><span class="tb-dot"></span>${PANEL_ICON[v]} ${TITLES[v][0]}</button>`).join('');
    container.insertBefore(taskbar, wrap);
    taskbar.querySelectorAll('[data-focus]').forEach(b=>{
      b.onclick = ()=>{
        const p = wrap.querySelector(`.view-panel[data-view="${b.dataset.focus}"]`);
        if(p) focusPanel(p, wrap, true);
      };
    });
  }

  list.forEach((v, idx)=>{
    const comboKey = comboKeyFor(list, v);
    if(!freeMode && !gridMode && idx>0 && list.length>1){
      const handle = document.createElement('div');
      handle.className = 'resize-handle';
      handle.dataset.before = list[idx-1];
      handle.dataset.after = v;
      wrap.appendChild(handle);
      bindResizeHandle(handle, wrap, list);
    }
    const panel = document.createElement('div');
    panel.className = 'view-panel';
    panel.draggable = (list.length>1 && !freeMode);
    panel.dataset.view = v;
    if(freeMode){
      const lay = panelLayout[comboKey] || { x: 20+idx*40, y: 20+idx*30, w:460, h:420 };
      panel.style.left = lay.x+'px'; panel.style.top = lay.y+'px';
      panel.style.width = lay.w+'px'; panel.style.height = lay.h+'px';
      panel.style.zIndex = 10+idx;
    } else if(gridMode){
      const gs = panelGridSize[comboKey];
      if(gs){ panel.style.width = gs.w+'px'; panel.style.height = gs.h+'px'; }
    } else if(panelWidths[comboKey] && list.length>1){
      panel.style.width = panelWidths[comboKey]+'px';
    }
    panel.innerHTML = `
      <div class="panel-head">
        ${list.length>1?'<div class="panel-drag-grip"><span></span><span></span><span></span><span></span><span></span><span></span></div>':''}
        <span class="panel-icon">${PANEL_ICON[v]}</span>
        <div class="panel-head-titles" title="${escapeHtml(TITLES[v][1])}"><h2>${TITLES[v][0]}</h2><div class="panel-sub">${TITLES[v][1]}</div></div>
        <div class="panel-head-actions">
          ${list.length>1?`<button class="panel-action-btn panel-close" data-close="${v}" title="Fechar esta visão">${ICO.close}</button>`:''}
        </div>
      </div>
      <div class="panel-body"></div>
      ${(freeMode||gridMode)?'<div class="resize-grip" title="Redimensionar"></div>':''}
    `;
    wrap.appendChild(panel);
    const body = panel.querySelector('.panel-body');
    if(v==='tabela') renderTabela(body);
    else if(v==='quadro') renderQuadro(body);
    else if(v==='calendario') renderCalendario(body);
    else if(v==='tarefas') renderTarefas(body);

    if(freeMode){
      bindFreePanel(panel, v, wrap, comboKey);
      // collision fix: clicking ANYWHERE on a panel (even a body interaction) brings it to front first,
      // so a sliver of a covered panel — or even its fully-hidden header — is always reachable via the taskbar,
      // and any visible part immediately raises it above siblings.
      panel.addEventListener('mousedown', ()=> focusPanel(panel, wrap, false), true);
    } else if(gridMode){
      bindGridResize(panel, v, comboKey);
      bindGridDrag(panel, v, wrap);
    } else if(list.length>1){
      const head = panel.querySelector('.panel-head');
      panel.addEventListener('dragstart', e=>{ dragPanelView = v; head.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
      panel.addEventListener('dragend', ()=>{ head.classList.remove('dragging'); dragPanelView=null; });
      panel.addEventListener('dragover', e=> e.preventDefault());
      panel.addEventListener('drop', e=>{
        e.preventDefault();
        if(!dragPanelView || dragPanelView===v) return;
        reorderViews(dragPanelView, v);
      });
    }
  });

  wrap.querySelectorAll('[data-close]').forEach(b=>{
    b.onclick = (e)=>{ e.stopPropagation(); activeViews.delete(b.dataset.close); render(); };
  });

const PANEL_ICON = { tabela:'🗂️', quadro:'📇', calendario:'📅', tarefas:'✅' };

function updateFreeWrapHeight(wrap){
  let maxBottom = 240;
  wrap.querySelectorAll('.view-panel').forEach(p=>{
    maxBottom = Math.max(maxBottom, p.offsetTop + p.offsetHeight);
  });
  wrap.style.minHeight = (maxBottom + 32) + 'px';
}

function focusPanel(panel, wrap, flash){
  const all = wrap.querySelectorAll('.view-panel');
  let maxZ = 10;
  all.forEach(p=> maxZ = Math.max(maxZ, +p.style.zIndex||10));
  if(+panel.style.zIndex < maxZ) panel.style.zIndex = maxZ+1;
  if(flash){
    panel.classList.add('tiling-active');
    setTimeout(()=> panel.classList.remove('tiling-active'), 420);
  }
}

function reorderViews(dragged, target){
  const order = VIEW_ORDER.filter(v=>activeViews.has(v));
  const from = order.indexOf(dragged), to = order.indexOf(target);
  if(from<0||to<0) return;
  order.splice(from,1);
  order.splice(to,0,dragged);
  customViewOrder = order;
  render();
}
let customViewOrder = null;

function bindResizeHandle(handle, wrap, list){
  handle.addEventListener('mousedown', (e)=>{
    e.preventDefault();
    handle.classList.add('dragging');
    const beforeView = handle.dataset.before;
    const beforePanel = [...wrap.children].find(c=>c.classList.contains('view-panel') && c.dataset.view===beforeView);
    const comboKey = comboKeyFor(list, beforeView);
    const startX = e.clientX;
    const startW = beforePanel.getBoundingClientRect().width;
    function onMove(ev){
      const delta = ev.clientX - startX;
      const newW = Math.max(300, startW + delta);
      beforePanel.style.width = newW+'px';
      panelWidths[comboKey] = newW;
    }
    function onUp(){
      handle.classList.remove('dragging');
      savePanelWidths();
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

/* grid mode: drag-to-reorder, with drop-target highlight */
function bindGridDrag(panel, v, wrap){
  const head = panel.querySelector('.panel-head');
  panel.addEventListener('dragstart', e=>{ dragPanelView = v; head.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
  panel.addEventListener('dragend', ()=>{ head.classList.remove('dragging'); panel.classList.remove('grid-drop-target'); dragPanelView=null; });
  panel.addEventListener('dragover', e=>{ e.preventDefault(); if(dragPanelView && dragPanelView!==v) panel.classList.add('grid-drop-target'); });
  panel.addEventListener('dragleave', ()=> panel.classList.remove('grid-drop-target'));
  panel.addEventListener('drop', e=>{
    e.preventDefault();
    panel.classList.remove('grid-drop-target');
    if(!dragPanelView || dragPanelView===v) return;
    reorderViews(dragPanelView, v);
  });
}

/* grid mode: per-panel resize via corner grip, persisted size, with size-snapping to sibling panels */
function bindGridResize(panel, v, comboKey){
  const grip = panel.querySelector('.resize-grip');
  if(!grip) return;
  grip.addEventListener('mousedown', (e)=>{
    e.preventDefault(); e.stopPropagation();
    grip.classList.add('active');
    panel.classList.add('tiling-active');
    const wrap = panel.parentElement;
    const siblings = [...wrap.querySelectorAll('.view-panel')].filter(p=>p!==panel);
    const startX = e.clientX, startY = e.clientY;
    const startW = panel.offsetWidth, startH = panel.offsetHeight;
    const SNAP = 10;
    function onMove(ev){
      let dw = Math.max(320, startW + (ev.clientX-startX));
      let dh = Math.max(220, startH + (ev.clientY-startY));
      siblings.forEach(s=> s.classList.remove('snap-match'));
      for(const s of siblings){
        if(Math.abs(s.offsetWidth-dw)<SNAP){ dw = s.offsetWidth; s.classList.add('snap-match'); }
        if(Math.abs(s.offsetHeight-dh)<SNAP){ dh = s.offsetHeight; s.classList.add('snap-match'); }
      }
      panel.style.width = dw+'px'; panel.style.height = dh+'px';
    }
    function onUp(){
      grip.classList.remove('active');
      panel.classList.remove('tiling-active');
      siblings.forEach(s=> s.classList.remove('snap-match'));
      panelGridSize[comboKey] = { w:panel.offsetWidth, h:panel.offsetHeight };
      savePanelGridSize();
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

/* free tiling: drag to move (via panel-head), drag grip to resize, with optional snapping + highlights */
const SNAP_THRESHOLD = 9;
function clearSnapGuides(wrap){ wrap.querySelectorAll('.snap-guide, .snap-edge-highlight').forEach(g=> g.remove()); }
function drawGuideV(wrap, x){
  const g = document.createElement('div'); g.className='snap-guide v'; g.style.left=x+'px'; wrap.appendChild(g); return g;
}
function drawGuideH(wrap, y){
  const g = document.createElement('div'); g.className='snap-guide h'; g.style.top=y+'px'; wrap.appendChild(g); return g;
}
function computeSnapTargets(wrap, panel){
  const targets = { xs:[0, wrap.clientWidth], ys:[0, wrap.clientHeight] };
  wrap.querySelectorAll('.view-panel').forEach(p=>{
    if(p===panel) return;
    const x = p.offsetLeft, y = p.offsetTop, w = p.offsetWidth, h = p.offsetHeight;
    targets.xs.push(x, x+w);
    targets.ys.push(y, y+h);
  });
  return targets;
}
function bindFreePanel(panel, v, wrap, comboKey){
  const head = panel.querySelector('.panel-head');
  const grip = panel.querySelector('.resize-grip');

  function bringToFront(){
    const all = wrap.querySelectorAll('.view-panel');
    let maxZ = 10;
    all.forEach(p=> maxZ = Math.max(maxZ, +p.style.zIndex||10));
    panel.style.zIndex = maxZ+1;
  }

  head.addEventListener('mousedown', (e)=>{
    if(e.target.closest('.panel-close')) return;
    e.preventDefault();
    bringToFront();
    panel.classList.add('tiling-active');
    const startX = e.clientX, startY = e.clientY;
    const startLeft = panel.offsetLeft, startTop = panel.offsetTop;
    const snapOn = SETTINGS.freeTilingSnap;
    const targets = snapOn ? computeSnapTargets(wrap, panel) : null;
    function onMove(ev){
      const dx = ev.clientX-startX, dy = ev.clientY-startY;
      let nx = Math.max(0, startLeft+dx);
      let ny = Math.max(0, startTop+dy);
      clearSnapGuides(wrap);
      if(snapOn){
        const w = panel.offsetWidth, h = panel.offsetHeight;
        for(const tx of targets.xs){
          if(Math.abs(nx-tx)<SNAP_THRESHOLD){ nx = tx; drawGuideV(wrap, tx); break; }
          if(Math.abs((nx+w)-tx)<SNAP_THRESHOLD){ nx = tx-w; drawGuideV(wrap, tx); break; }
        }
        for(const ty of targets.ys){
          if(Math.abs(ny-ty)<SNAP_THRESHOLD){ ny = ty; drawGuideH(wrap, ty); break; }
          if(Math.abs((ny+h)-ty)<SNAP_THRESHOLD){ ny = ty-h; drawGuideH(wrap, ty); break; }
        }
      }
      panel.style.left = nx+'px'; panel.style.top = ny+'px';
      updateFreeWrapHeight(wrap);
    }
    function onUp(){
      panel.classList.remove('tiling-active');
      clearSnapGuides(wrap);
      panelLayout[comboKey] = { x:panel.offsetLeft, y:panel.offsetTop, w:panel.offsetWidth, h:panel.offsetHeight };
      savePanelLayout();
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  if(grip){
    grip.addEventListener('mousedown', (e)=>{
      e.preventDefault(); e.stopPropagation();
      bringToFront();
      grip.classList.add('active');
      panel.classList.add('tiling-active');
      const startX = e.clientX, startY = e.clientY;
      const startW = panel.offsetWidth, startH = panel.offsetHeight;
      const snapOn = SETTINGS.freeTilingSnap;
      const targets = snapOn ? computeSnapTargets(wrap, panel) : null;
      function onMove(ev){
        let dw = Math.max(280, startW + (ev.clientX-startX));
        let dh = Math.max(200, startH + (ev.clientY-startY));
        clearSnapGuides(wrap);
        if(snapOn){
          const left = panel.offsetLeft, top = panel.offsetTop;
          for(const tx of targets.xs){
            if(Math.abs((left+dw)-tx)<SNAP_THRESHOLD){ dw = tx-left; drawGuideV(wrap, tx); break; }
          }
          for(const ty of targets.ys){
            if(Math.abs((top+dh)-ty)<SNAP_THRESHOLD){ dh = ty-top; drawGuideH(wrap, ty); break; }
          }
        }
        panel.style.width = dw+'px'; panel.style.height = dh+'px';
        updateFreeWrapHeight(wrap);
      }
      function onUp(){
        grip.classList.remove('active');
        panel.classList.remove('tiling-active');
        clearSnapGuides(wrap);
        panelLayout[comboKey] = { x:panel.offsetLeft, y:panel.offsetTop, w:panel.offsetWidth, h:panel.offsetHeight };
        savePanelLayout();
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  }
}

/* ============================ KEYBOARD SHORTCUTS ============================ */
function isTypingContext(el){
  if(!el) return false;
  const tag = (el.tagName||'').toLowerCase();
  return tag==='input' || tag==='textarea' || tag==='select' || el.isContentEditable;
}
document.addEventListener('keydown', (e)=>{
  // Esc: close topmost overlay / icon-picker / link-preview, whichever is open
  if(e.key==='Escape'){
    const picker = document.querySelector('.icon-picker');
    if(picker){ picker.remove(); return; }
    const overlays = document.querySelectorAll('.overlay');
    if(overlays.length){ overlays[overlays.length-1].remove(); return; }
    if(openItemId){ openItemId = null; render(); return; }
    return;
  }
  // Ctrl/Cmd+K: focus search (auto-opens floating sidebar if collapsed)
  if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==='k'){
    e.preventDefault();
    if(SETTINGS.sidebarMode==='floating' && sidebarCollapsed){ sidebarCollapsed = false; applySidebarCollapsed(); }
    const input = document.getElementById('searchInput');
    if(input){ input.focus(); input.select(); }
    return;
  }
  // N: new item (ignored while typing in a field or with modifier keys held)
  if(e.key.toLowerCase()==='n' && !e.ctrlKey && !e.metaKey && !e.altKey && !isTypingContext(e.target)){
    if(document.querySelector('.overlay')) return;
    e.preventDefault();
    quickCreate();
  }
});

/* ============================ SYNC (self-hosted homelab server) ============================ */
// Optional: point this app at a small self-hosted sync server (see companion server files)
// so your items are available from any device over the internet. Configure the server URL
// and access token in Settings → Sincronização. Data stored locally in localStorage always
// remains the source of truth for this device; sync just pushes/pulls the DB array as JSON.
let _syncPushTimer = null;
function scheduleSyncPush(){
  if(!SETTINGS.sync || !SETTINGS.sync.enabled || !SETTINGS.sync.autoSync) return;
  clearTimeout(_syncPushTimer);
  _syncPushTimer = setTimeout(()=> syncPush(true), 1500);
}
function syncHeaders(){
  const h = { 'Content-Type':'application/json' };
  if(SETTINGS.sync && SETTINGS.sync.token) h['Authorization'] = 'Bearer ' + SETTINGS.sync.token;
  return h;
}
function setSyncStatus(state, extra){
  const el = document.getElementById('saveIndicator');
  if(!el) return;
  if(state==='syncing'){ el.textContent = 'Sincronizando…'; el.classList.add('visible','syncing'); el.classList.remove('synced'); }
  else if(state==='synced'){ el.textContent = 'Sincronizado'; el.classList.add('visible','synced'); el.classList.remove('syncing'); clearTimeout(_saveFlashTimer); _saveFlashTimer = setTimeout(()=> el.classList.remove('visible'), 2200); }
  else if(state==='error'){ el.textContent = 'Erro ao sincronizar'; el.classList.add('visible'); el.classList.remove('syncing','synced'); clearTimeout(_saveFlashTimer); _saveFlashTimer = setTimeout(()=> el.classList.remove('visible'), 3000); }
}
async function syncPush(silent){
  if(!SETTINGS.sync || !SETTINGS.sync.url) return false;
  if(!silent) setSyncStatus('syncing');
  try{
    const res = await fetch(SETTINGS.sync.url.replace(/\/$/,'')+'/api/data', {
      method:'PUT', headers:syncHeaders(), body: JSON.stringify({ db: DB, updatedAt: Date.now() })
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    SETTINGS.sync.lastSync = Date.now();
    saveSettings();
    setSyncStatus('synced');
    return true;
  }catch(err){
    setSyncStatus('error');
    if(!silent) showToast('Falha ao enviar dados ao servidor: '+err.message);
    return false;
  }
}
async function syncPull(silent){
  if(!SETTINGS.sync || !SETTINGS.sync.url) return false;
  if(!silent) setSyncStatus('syncing');
  try{
    const res = await fetch(SETTINGS.sync.url.replace(/\/$/,'')+'/api/data', { headers:syncHeaders() });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    if(data && Array.isArray(data.db)){
      DB = data.db;
      localStorage.setItem(DB_KEY, JSON.stringify(DB));
      render();
    }
    SETTINGS.sync.lastSync = Date.now();
    saveSettings();
    setSyncStatus('synced');
    return true;
  }catch(err){
    setSyncStatus('error');
    if(!silent) showToast('Falha ao baixar dados do servidor: '+err.message);
    return false;
  }
}
async function syncTest(){
  if(!SETTINGS.sync || !SETTINGS.sync.url) { showToast('Informe a URL do servidor primeiro.'); return; }
  try{
    const res = await fetch(SETTINGS.sync.url.replace(/\/$/,'')+'/api/health', { headers:syncHeaders() });
    if(res.ok) showToast('Conexão com o servidor OK ✓');
    else showToast('Servidor respondeu com erro: HTTP '+res.status);
  }catch(err){
    showToast('Não foi possível conectar: '+err.message);
  }
}
// pull once on load if sync is enabled, so a fresh device gets existing data
if(SETTINGS.sync && SETTINGS.sync.enabled && SETTINGS.sync.url){
  syncPull(true);
}

render();
</script>
